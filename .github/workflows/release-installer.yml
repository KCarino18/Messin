name: Release desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.3.0)"
        required: true
        default: "v0.3.0"

permissions:
  contents: write

env:
  DATABASE_URL: file:./prisma/dev.db

jobs:
  release-meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: release-meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Build Windows Setup.exe
        shell: bash
        run: |
          printf 'DATABASE_URL=file:./prisma/dev.db\nPREORDER_POLL_MS=60000\nTAX_RATE=0.08\nPRICE_MODE=live\n' > .env
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed
          node scripts/prepare-desktop.mjs
          npx electron-builder --win nsis --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-desktop/MTG-Budget-Setup-*.exe

  build-linux:
    needs: release-meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Build Linux AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 unzip
          printf 'DATABASE_URL=file:./prisma/dev.db\nPREORDER_POLL_MS=60000\nTAX_RATE=0.08\nPRICE_MODE=live\n' > .env
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed
          node scripts/prepare-desktop.mjs
          npx electron-builder --linux AppImage --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: dist-desktop/MTG-Budget-*-Linux.AppImage

  build-mac:
    needs: release-meta
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Build macOS dmg
        run: |
          printf 'DATABASE_URL=file:./prisma/dev.db\nPREORDER_POLL_MS=60000\nTAX_RATE=0.08\nPRICE_MODE=live\n' > .env
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed
          node scripts/prepare-desktop.mjs
          npx electron-builder --mac dmg --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-desktop/MTG-Budget-*-macOS.dmg

  publish-release:
    needs: [release-meta, build-windows, build-linux, build-mac]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.exe' -o -name '*.AppImage' -o -name '*.dmg' \) -exec cp {} release-files/ \;
          ls -lah release-files
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          name: MTG Budget ${{ needs.release-meta.outputs.tag }}
          draft: false
          generate_release_notes: true
          body: |
            ## Install the desktop app

            1. Download **MTG-Budget-Setup-*.exe** (Windows)
            2. Double-click to install
            3. Launch **MTG Budget** from the Start Menu or Desktop shortcut

            This is a real desktop application installed on your computer — not a website and not a zip of scripts.

            | OS | Installer |
            | --- | --- |
            | **Windows** | `MTG-Budget-Setup-*.exe` |
            | **Linux** | `MTG-Budget-*-Linux.AppImage` |
            | **macOS** | `MTG-Budget-*-macOS.dmg` (when available) |
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
